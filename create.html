<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>建立自訂分析器 | AI Team Intro</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b1a2e; color:#f0f4f8; margin:0; padding:40px; }
    .card { max-width: 720px; margin: 0 auto; background:#112244; border:1px solid rgba(255,255,255,.1); border-radius:20px; padding:28px; }
    a { color:#00e0a8; }
    input, textarea, button { width:100%; padding:12px; margin-top:10px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:#0d2240; color:#fff; }
    button { background:#00e0a8; color:#0b1a2e; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>建立自訂分析器</h1>
    <p>可輸入角色、標籤與簡介，這是可驗收的基礎頁面版本。</p>
    <label>分析器名稱</label>
    <input placeholder="例如：夜戰型分析器" />
    <label>說明</label>
    <textarea rows="6" placeholder="輸入自訂分析邏輯或觀察點"></textarea>
    <button>儲存設定</button>
    <p style="margin-top:16px;"><a href="/">返回首頁</a></p>
  </div>
</body>
</html>
